<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5c);
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .calculator {
    background: #22223b;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    width: 320px;
  }

  .display {
    background: #0f0f1a;
    border-radius: 12px;
    padding: 20px 15px;
    margin-bottom: 15px;
    text-align: right;
    color: #fff;
    overflow: hidden;
  }

  .display .prev {
    font-size: 14px;
    color: #999;
    min-height: 18px;
  }

  .display .current {
    font-size: 36px;
    font-weight: 500;
    word-wrap: break-word;
    word-break: break-all;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    border: none;
    outline: none;
    padding: 18px 0;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    background: #3a3a5c;
    color: #fff;
    transition: transform 0.1s ease, background 0.2s ease;
  }

  button:active {
    transform: scale(0.94);
  }

  button:hover {
    background: #4a4a72;
  }

  .operator {
    background: #ff9f43;
  }

  .operator:hover {
    background: #ffb066;
  }

  .equals {
    background: #22c55e;
    grid-column: span 2;
  }

  .equals:hover {
    background: #2ee06d;
  }

  .clear, .delete {
    background: #ef4444;
  }

  .clear:hover, .delete:hover {
    background: #f56565;
  }

  .zero {
    grid-column: span 2;
  }
</style>
</head>
<body>

<div class="calculator">
  <div class="display">
    <div class="prev" id="prevOperand"></div>
    <div class="current" id="currentOperand">0</div>
  </div>

  <div class="buttons">
    <button class="clear" onclick="clearAll()">AC</button>
    <button class="delete" onclick="deleteLast()">DEL</button>
    <button class="operator" onclick="chooseOperator('%')">%</button>
    <button class="operator" onclick="chooseOperator('÷')">÷</button>

    <button onclick="appendNumber('7')">7</button>
    <button onclick="appendNumber('8')">8</button>
    <button onclick="appendNumber('9')">9</button>
    <button class="operator" onclick="chooseOperator('×')">×</button>

    <button onclick="appendNumber('4')">4</button>
    <button onclick="appendNumber('5')">5</button>
    <button onclick="appendNumber('6')">6</button>
    <button class="operator" onclick="chooseOperator('-')">-</button>

    <button onclick="appendNumber('1')">1</button>
    <button onclick="appendNumber('2')">2</button>
    <button onclick="appendNumber('3')">3</button>
    <button class="operator" onclick="chooseOperator('+')">+</button>

    <button class="zero" onclick="appendNumber('0')">0</button>
    <button onclick="appendNumber('.')">.</button>
    <button class="equals" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let currentOperand = '0';
  let prevOperand = '';
  let operation = undefined;

  const currentOperandEl = document.getElementById('currentOperand');
  const prevOperandEl = document.getElementById('prevOperand');

  function updateDisplay() {
    currentOperandEl.textContent = currentOperand;
    if (operation != null) {
      prevOperandEl.textContent = `${prevOperand} ${operation}`;
    } else {
      prevOperandEl.textContent = '';
    }
  }

  function appendNumber(number) {
    if (number === '.' && currentOperand.includes('.')) return;
    if (currentOperand === '0' && number !== '.') {
      currentOperand = number;
    } else {
      currentOperand += number;
    }
    updateDisplay();
  }

  function chooseOperator(op) {
    if (currentOperand === '') return;
    if (prevOperand !== '') {
      calculate();
    }
    operation = op;
    prevOperand = currentOperand;
    currentOperand = '';
    updateDisplay();
  }

  function calculate() {
    let result;
    const prev = parseFloat(prevOperand);
    const current = parseFloat(currentOperand);
    if (isNaN(prev) || isNaN(current)) return;

    switch (operation) {
      case '+':
        result = prev + current;
        break;
      case '-':
        result = prev - current;
        break;
      case '×':
        result = prev * current;
        break;
      case '÷':
        result = current === 0 ? 'Error' : prev / current;
        break;
      case '%':
        result = prev % current;
        break;
      default:
        return;
    }

    currentOperand = result.toString();
    operation = undefined;
    prevOperand = '';
    updateDisplay();
  }

  function clearAll() {
    currentOperand = '0';
    prevOperand = '';
    operation = undefined;
    updateDisplay();
  }

  function deleteLast() {
    if (currentOperand.length === 1) {
      currentOperand = '0';
    } else {
      currentOperand = currentOperand.slice(0, -1);
    }
    updateDisplay();
  }

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
    if (e.key === '.') appendNumber('.');
    if (e.key === '+') chooseOperator('+');
    if (e.key === '-') chooseOperator('-');
    if (e.key === '*') chooseOperator('×');
    if (e.key === '/') chooseOperator('÷');
    if (e.key === 'Enter' || e.key === '=') calculate();
    if (e.key === 'Backspace') deleteLast();
    if (e.key === 'Escape') clearAll();
  });
</script>

</body>
</html>
